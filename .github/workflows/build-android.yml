name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install NDK & CMake
        run: |
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1" 2>/dev/null || true
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: ⚡ Gradlew permissions
        working-directory: android
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        id: gradle
        working-directory: android
        continue-on-error: true
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log
          echo "gradle_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: 📋 Write Gradle output to Summary
        if: always()
        run: |
          echo "## Gradle Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/gradle.log | grep -E "(FAILURE|error:|Error|Exception|BUILD|Caused by|Could not|> Task|warning:)" | tail -80 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if Gradle failed
        if: steps.gradle.outputs.gradle_exit != '0'
        run: exit 1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-camera-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ APK size
        run: echo "✅ $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
