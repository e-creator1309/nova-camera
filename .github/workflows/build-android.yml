name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: ⚡ Gradlew permissions
        working-directory: android
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        id: gradle
        working-directory: android
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle.log

      - name: 📋 Post error as commit comment
        if: steps.gradle.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('/tmp/gradle.log', 'utf8'); } catch(e) { log = 'No log file'; }
            // Extract the error section: lines containing key error markers
            const lines = log.split('\n');
            const errorStart = lines.findIndex(l => l.includes('* What went wrong') || l.includes('FAILURE:'));
            const errorSection = errorStart >= 0
              ? lines.slice(Math.max(0, errorStart - 5), errorStart + 60).join('\n')
              : lines.slice(-80).join('\n');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '## ❌ Gradle Build Error\n```\n' + errorSection + '\n```'
            });

      - name: ❌ Fail if Gradle failed
        if: steps.gradle.outcome == 'failure'
        run: exit 1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-camera-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ APK size
        run: echo "✅ $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
