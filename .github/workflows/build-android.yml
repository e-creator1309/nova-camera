name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: ⚡ Make Gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee /tmp/gradle-build.log
          # Exit with gradle's exit code
          exit ${PIPESTATUS[0]}

      - name: 📋 Upload Gradle log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle-build.log
          retention-days: 7

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nova-camera-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Print APK size
        if: success()
        run: echo "✅ APK: $(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
