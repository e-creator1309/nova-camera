name: 🤖 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🏗️ Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Updated to 22 (current LTS) to avoid Node 20 deprecation
          node-version: '22'
          cache: 'pnpm'
          # Points to the actual location of your lockfile
          cache-dependency-path: 'artifacts/camera-app/pnpm-lock.yaml'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Install dependencies
        # Added working-directory to execute pnpm in the correct folder
        working-directory: artifacts/camera-app
        run: pnpm install

      - name: 🔨 Expo Prebuild (generate native Android project)
        working-directory: artifacts/camera-app
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: ⚡ Make Gradlew executable
        working-directory: artifacts/camera-app/android
        run: chmod +x gradlew

      - name: 🏗️ Build Debug APK
        working-directory: artifacts/camera-app/android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-camera-debug
          path: artifacts/camera-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Print APK size
        run: |
          APK="artifacts/camera-app/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "APK built: $(du -h $APK | cut -f1)"
